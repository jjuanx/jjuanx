# Guarda este archivo en tu repo jjuanx/jjuanx como:
# .github/workflows/snake.yml
name: Generar snake de contribuciones

on:
  schedule:
    - cron: "0 0 * * *" # cada día a medianoche (UTC)
  workflow_dispatch: # permite lanzarlo manualmente desde la pestaña Actions
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generar snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
